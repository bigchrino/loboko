<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - LOBOKO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page-body">
    <div class="login-page">
      <div class="login-container">
        <img src="logo.jpg" alt="LOBOKO" class="login-logo" />
        <h1 class="login-title">Bienvenue sur LOBOKO</h1>
        <p class="login-subtitle">
          Veuillez entrer vos informations pour vous connecter.
        </p>
        <form action="accueil.html" method="get" class="login-form">
          <div class="input-group">
            <label for="username">Nom d'utilisateur ou numéro de téléphone</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Entrez votre identifiant"
              required
            />
          </div>
          <div class="input-group">
            <label for="password">Mot de passe</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Entrez votre mot de passe"
              required
            />
          </div>
          <button type="submit" class="btn-primary">Se connecter</button>
        </form>
        <p class="login-footer">
          Pas encore de compte ?
          <a href="#">Créer un compte</a>
        </p>
      </div>
    </div>
  </body>
</html>
